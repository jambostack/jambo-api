# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones

    App\Service\WebhookSecretService:
        arguments:
            $webhookSecretKey: '%env(APP_WEBHOOK_SECRET_KEY)%'

    App\Repository\ApiTokenRepository:
        arguments:
            $appSecret: '%kernel.secret%'

    App\Service\ApiTokenChecker:
        arguments:
            $appSecret: '%kernel.secret%'

    App\Service\ExportImport\Export\MediaExportHandler:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Service\ExportImport\Import\MediaImportHandler:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Service\ExportImport\ProjectExporter:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Service\ExportImport\ProjectImporter:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Service\EndUserJwtService:
        arguments:
            $appSecret: '%kernel.secret%'

    App\Service\ImageTransformService:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\Controller\McpController:
        arguments:
            $mcpLimiter: '@limiter.mcp_limiter'

    App\Mcp\JamboApiMcpServer:
        lazy: true
        calls:
            - setAuditService: ['@App\Service\AuditService']

    App\Service\SearchService:
        arguments:
            $meilisearchHost: '%env(MEILISEARCH_HOST)%'
            $meilisearchKey: '%env(MEILISEARCH_KEY)%'

    App\Service\AiContentService:
        arguments:
            $openaiPlatform: '@ai.traceable_platform.openai'
            $anthropicPlatform: '@ai.traceable_platform.anthropic'
            $ollamaPlatform: '@ai.traceable_platform.ollama'
            $deepseekPlatform: '@ai.traceable_platform.deepseek'
            $appSettingsRepository: '@App\Repository\AppSettingsRepository'

    App\Workbench\Templates\NextjsTemplate: ~
    App\Workbench\Templates\NuxtTemplate: ~
    App\Workbench\Templates\AstroTemplate: ~
    App\Workbench\Templates\SvelteKitTemplate: ~

    App\Service\WorkbenchStreamService:
        arguments:
            $templates:
                - '@App\Workbench\Templates\NextjsTemplate'
                - '@App\Workbench\Templates\NuxtTemplate'
                - '@App\Workbench\Templates\AstroTemplate'
                - '@App\Workbench\Templates\SvelteKitTemplate'

    App\Controller\WorkbenchController:
        arguments:
            $openaiPlatform: '@ai.traceable_platform.openai'
            $anthropicPlatform: '@ai.traceable_platform.anthropic'
            $ollamaPlatform: '@ai.traceable_platform.ollama'
            $deepseekPlatform: '@ai.traceable_platform.deepseek'
            $templates:
                - '@App\Workbench\Templates\NextjsTemplate'
                - '@App\Workbench\Templates\NuxtTemplate'
                - '@App\Workbench\Templates\AstroTemplate'
                - '@App\Workbench\Templates\SvelteKitTemplate'

    # Deploy providers — OAuth credentials read from AppSettings (Jambo settings UI, no env vars)
    App\Service\Deploy\VercelDeployProvider: ~
    App\Service\Deploy\NetlifyDeployProvider: ~
    App\Service\Deploy\RailwayDeployProvider: ~

    App\Service\Deploy\DeployService:
        arguments:
            $appSecret: '%kernel.secret%'
            $providers:
                - '@App\Service\Deploy\VercelDeployProvider'
                - '@App\Service\Deploy\NetlifyDeployProvider'
                - '@App\Service\Deploy\RailwayDeployProvider'

    App\Service\ZipExportService:
        arguments:
            $templates:
                - '@App\Workbench\Templates\NextjsTemplate'
                - '@App\Workbench\Templates\NuxtTemplate'
                - '@App\Workbench\Templates\AstroTemplate'
                - '@App\Workbench\Templates\SvelteKitTemplate'

    # ── Jambo Cloud (Phase 3) ────────────────────────────────────────────────
    App\Service\Cloud\TraefikLabelBuilder:
        arguments:
            $baseDomain:   '%env(JAMBO_CLOUD_BASE_DOMAIN)%'
            $certResolver: 'letsencrypt'

    App\Service\Cloud\DockerContainerOrchestrator:
        arguments:
            $dockerApiBase: '%env(DOCKER_API_BASE)%'
            $network:       'jambo_cloud'

    App\Service\Cloud\ContainerOrchestratorInterface: '@App\Service\Cloud\DockerContainerOrchestrator'

    App\Service\Cloud\SystemDnsResolver: ~
    App\Service\Cloud\DnsResolverInterface: '@App\Service\Cloud\SystemDnsResolver'

    App\Service\Cloud\HostedAppService:
        arguments:
            $templates:
                - '@App\Workbench\Templates\NextjsTemplate'
                - '@App\Workbench\Templates\NuxtTemplate'
                - '@App\Workbench\Templates\AstroTemplate'
                - '@App\Workbench\Templates\SvelteKitTemplate'
            $jamboApiUrl: '%env(default::JAMBO_PUBLIC_URL)%'
            $baseDomain:  '%env(JAMBO_CLOUD_BASE_DOMAIN)%'

    App\Controller\CloudController:
        arguments:
            $cloudEnabled: '%env(bool:JAMBO_CLOUD_ENABLED)%'
