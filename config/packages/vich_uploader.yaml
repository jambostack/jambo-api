vich_uploader:
    db_driver: orm
    mappings:
        media_files:
            uri_prefix: /uploads/media
            upload_destination: '%kernel.project_dir%/public/uploads/media'
            namer: Vich\UploaderBundle\Naming\UniqidNamer
            directory_namer: App\Service\ProjectDirNamer
        app_media:
            uri_prefix: /uploads/app
            upload_destination: '%kernel.project_dir%/public/uploads/app'
            namer: Vich\UploaderBundle\Naming\UniqidNamer
