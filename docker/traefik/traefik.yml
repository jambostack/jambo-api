# docker/traefik/traefik.yml
entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"

providers:
  docker:
    exposedByDefault: false
    network: jambo_cloud

certificatesResolvers:
  letsencrypt:
    acme:
      email: "ops@example.com"        # set JAMBO_ACME_EMAIL
      storage: /letsencrypt/acme.json
      # Wildcard *.jambo.app needs the DNS challenge:
      dnsChallenge:
        provider: cloudflare
        resolvers:
          - "1.1.1.1:53"

api:
  dashboard: true
