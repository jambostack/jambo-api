name: JamboApi CMS CI/CD

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

env:
  PHP_VERSION: '8.4'
  NODE_VERSION: '22'

jobs:
  # ===== Tests =====
  tests:
    name: Tests & Lint
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
          MYSQL_DATABASE: jamboapicms_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, intl, pdo_mysql, gd
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Install JS dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Run database migrations
        run: php bin/console doctrine:migrations:migrate --no-interaction --env=test
        env:
          DATABASE_URL: mysql://root:@127.0.0.1:3306/jamboapicms_test?serverVersion=8.0

      - name: Run tests
        run: php vendor/bin/phpunit --no-coverage
        env:
          DATABASE_URL: mysql://root:@127.0.0.1:3306/jamboapicms_test?serverVersion=8.0

  # ===== Build Docker Image =====
  build:
    name: Build & Push Docker
    runs-on: ubuntu-latest
    needs: tests
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ===== Deploy =====
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to production
        run: |
          echo "Deploying to production..."
          # Remplacer par votre commande de deploy:
          # ssh deploy@server "docker pull ghcr.io/${{ github.repository }}:main && docker compose up -d"

      - name: Sync content schema
        run: |
          echo "Syncing content schema..."
          # php bin/console jambo:sync-schema prod --dry-run
