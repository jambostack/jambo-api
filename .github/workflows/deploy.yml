name: JamboApi CMS CI/CD

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

env:
  PHP_VERSION: '8.4'
  NODE_VERSION: '22'

jobs:
  tests:
    name: Tests & Lint
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: jamboapicms
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost -u root -proot"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, intl, pdo_mysql, gd, zip, curl, dom, xml
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Verify MySQL connection
        run: |
          echo "Waiting for MySQL..."
          for i in $(seq 1 30); do
            if mysqladmin ping -h 127.0.0.1 -u root -proot --silent 2>/dev/null; then
              echo "MySQL ready (attempt $i)"
              break
            fi
            echo "Attempt $i/30..."
            sleep 2
          done
          mysql -h 127.0.0.1 -u root -proot -e "SHOW DATABASES;"

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-scripts
        env:
          APP_ENV: test

      - name: Run post-install scripts
        run: composer run-script post-install-cmd
        env:
          APP_ENV: test

      - name: Install JS dependencies
        run: npm ci
        env:
          APP_ENV: test

      - name: Build assets
        run: npm run build
        env:
          APP_ENV: test

      - name: Configure test environment
        run: |
          cat > .env.test << 'ENVEOF'
          DATABASE_URL="mysql://root:root@127.0.0.1:3306/jamboapicms?serverVersion=8.0&charset=utf8mb4"
          APP_ENV=test
          MAILER_DSN=null://null
          ENVEOF

      - name: Run database migrations
        run: php bin/console doctrine:migrations:migrate --no-interaction --env=test

      - name: Run tests
        run: php vendor/bin/phpunit --no-coverage

  # ===== Build Docker Image =====
  build:
    name: Build & Push Docker
    runs-on: ubuntu-latest
    needs: tests
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ===== Deploy =====
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to production
        run: |
          echo "Deploying to production..."
          # Remplacer par votre commande de deploy:
          # ssh deploy@server "docker pull ghcr.io/${{ github.repository }}:main && docker compose up -d"

      - name: Sync content schema
        run: |
          echo "Syncing content schema..."
          # php bin/console jambo:sync-schema prod --dry-run
