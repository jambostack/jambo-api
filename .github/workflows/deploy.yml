name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:
    inputs:
      target:
        description: 'Deployment target'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ────────────────────────────────────────────────────────────────────
  # 1. Build & push the Docker image to GHCR on every commit to main
  #    and on PRs labeled `preview`.
  # ────────────────────────────────────────────────────────────────────
  build:
    name: Build & push image
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push'
      || github.event_name == 'workflow_dispatch'
      || (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'preview'))
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ────────────────────────────────────────────────────────────────────
  # 2. Preview environment for PRs labeled `preview`.
  #    Each PR gets its own subdomain via the configured runner.
  # ────────────────────────────────────────────────────────────────────
  preview:
    name: Deploy preview
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'preview')
    environment:
      name: preview-pr-${{ github.event.pull_request.number }}
      url: https://pr-${{ github.event.pull_request.number }}.preview.jamboapi.example
    steps:
      - name: Resolve image tag
        id: tag
        run: echo "tag=pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"

      - name: Trigger preview deployment
        env:
          DEPLOY_WEBHOOK: ${{ secrets.PREVIEW_DEPLOY_WEBHOOK }}
        run: |
          if [ -z "$DEPLOY_WEBHOOK" ]; then
            echo "::warning::PREVIEW_DEPLOY_WEBHOOK secret missing — skipping remote trigger."
            exit 0
          fi
          curl -sS -X POST "$DEPLOY_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{
              \"pr\": \"${{ github.event.pull_request.number }}\",
              \"image\": \"${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}\",
              \"sha\": \"${{ github.sha }}\"
            }"

      - name: Comment on PR
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            **Jambo Deploy** — preview en cours pour ce PR.

            - Image : `${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:pr-${{ github.event.pull_request.number }}`
            - URL : https://pr-${{ github.event.pull_request.number }}.preview.jamboapi.example

  # ────────────────────────────────────────────────────────────────────
  # 3. Production deployment, gated behind the `production` environment.
  # ────────────────────────────────────────────────────────────────────
  production:
    name: Deploy production
    needs: build
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
      || (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'production')
    environment:
      name: production
      url: https://app.jamboapi.example
    steps:
      - name: Trigger production deployment
        env:
          DEPLOY_WEBHOOK: ${{ secrets.PRODUCTION_DEPLOY_WEBHOOK }}
        run: |
          if [ -z "$DEPLOY_WEBHOOK" ]; then
            echo "::warning::PRODUCTION_DEPLOY_WEBHOOK secret missing — skipping remote trigger."
            exit 0
          fi
          curl -sS -X POST "$DEPLOY_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{
              \"target\": \"production\",
              \"image\": \"${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest\",
              \"sha\": \"${{ github.sha }}\"
            }"

      - name: Annotate run
        run: |
          echo "::notice::Production deploy triggered for sha ${{ github.sha }}"
