name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    name: Tests PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['8.4']

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: jamboapicms
        ports:
          - 3306:3306
        options: --health-cmd "mysqladmin ping -h localhost -u root -proot" --health-interval 10s --health-timeout 5s --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, intl, pdo_mysql, gd, zip
          tools: composer:v2

      - name: Wait for MySQL
        run: |
          for i in $(seq 1 30); do
            if mysqladmin ping -h 127.0.0.1 -u root -proot --silent 2>/dev/null; then echo "MySQL ready"; break; fi
            sleep 2
          done

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist
        env:
          APP_ENV: test
          DATABASE_URL: mysql://root:root@127.0.0.1:3306/jamboapicms?serverVersion=8.0

      - name: Create database schema
        run: php bin/console doctrine:database:create --if-not-exists --env=test -n || true ; php bin/console doctrine:schema:update --force --env=test -n
        env:
          APP_ENV: test
          DATABASE_URL: mysql://root:root@127.0.0.1:3306/jamboapicms?serverVersion=8.0

      - name: Run tests
        run: php vendor/bin/phpunit --no-coverage
        env:
          APP_ENV: test
          DATABASE_URL: mysql://root:root@127.0.0.1:3306/jamboapicms?serverVersion=8.0
